<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="style.css">
  <title>wether app</title>
</head>
<body>
  <div class="weather">
    <!-- primary part start -->
    <form class="scarch-form" action="">
      <input class="city-input" type="text" placeholder="Enter City Name">
      <button class="scarch-btn " type="submit">
       <i class="material-icons">search</i>
       
      </button>
    </form>
    <!-- primary part end  -->

    <!-- first part start -->
     <div class="city-date">
      <h2 class="city">Dhaka</h2>
      <p class="date">15 april 2026</p>

     </div>
     <!--first part end -->

     <!-- secand part start -->
      <div class="temperature-info">
        <div class="description">
          <i class="material-icons">sunny</i>
          <span class="des-tex">Sunny</span>
        </div>
        <div class="temp">20°</div>
        
      </div>
      <!-- secand part end -->

       <!-- thirtd part start  -->
        <div class="additional-info">
          <div class="one">
            <i class="material-icons">air</i>
            <div class="one-text">
              <h3 class="wind-speed">4 KM/H</h3>
              <p class="wind-leble">Wind</p>
            </div>
            </div>
            <div class="one">
            <i class="material-icons">water_drop</i>
            <div class="one-text">
              <h3 class="humidity">45%</h3>
              <p class="humidity_leble">humidity</p>
            </div>
            </div>

            <div class="one">
            <i class="material-icons">visibility</i>
            <div class="one-text">
              <h3 class="visibility_distance">4 KM/H</h3>
              <p class="visibility_leble">visibility</p>
            </div>
            </div>
        </div>

          

        </div>
        <!-- third part end -->
  </div>
  <script src="script.js" ></script>
  
</body>
</html>
